<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; margin: 0; padding: 15px; overflow: hidden; }
      .container { display: flex; align-items: flex-start; gap: 15px; }
      
      /* Лоадер слева */
      .loader { 
        border: 3px solid #f3f3f3; border-top: 3px solid #4285f4; 
        border-radius: 50%; width: 30px; height: 30px; 
        animation: spin 1s linear infinite; flex-shrink: 0;
        transition: width .25s ease, height .25s ease, opacity .25s ease, margin .25s ease, border-width .25s ease;
      }
      .container.done { gap: 0; }
      .container.done .loader {
        width: 0;
        height: 0;
        opacity: 0;
        margin: 0;
        border-width: 0;
        animation: none;
      }
      
      /* Лог справа - ОБНОВЛЕННЫЙ */
      #log-container { 
        flex-grow: 1; 
        font-size: 11px; 
        color: #333; 
        text-align: left; 
        max-height: 460px; /* Увеличили высоту прокрутки */
        overflow-y: auto; 
        /* КРИТИЧНО: сохраняем переносы строк \n из нашего лога */
        white-space: pre-wrap; 
        word-wrap: break-word;
        line-height: 1.4;
      }

      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="loader" id="spinner"></div>
      <div id="log-container">Инициализация...</div>
    </div>
 
<script>
  // 1. Сразу при открытии ставим статус ожидания
  document.getElementById('log-container').innerText = "🚀 Запуск...";

  const poll = setInterval(function() {
    google.script.run.withSuccessHandler(function(statusText) {
      // Если данных в кэше еще нет, ничего не делаем
      if (!statusText || statusText === "Подготовка...") {
        return; 
      }
      
      var logContainer = document.getElementById('log-container');
      if (logContainer) {
        logContainer.innerText = statusText;
        // Прокрутка вниз к последнему сообщению
        logContainer.scrollTop = logContainer.scrollHeight;
      }

      // 3. Завершаем только по финальным статусам.
      // ⚠️ может быть промежуточным (например, "Найдено новых источников..."), поэтому не стопаемся на нем.
      const isDone = statusText.indexOf("🏆 Готово!") !== -1 || statusText.indexOf("❌ Ошибка") !== -1;
      if (isDone) {
        // Останавливаем опрос сервера (квоты Google не бесконечны)
        clearInterval(poll);
        
        // Схлопываем лоадер после завершения
        var wrapper = document.querySelector('.container');
        if (wrapper) {
          wrapper.classList.add('done');
        }
      }
    }).withFailureHandler(function(err) {
      clearInterval(poll);
      var logContainer = document.getElementById('log-container');
      if (logContainer) {
        logContainer.innerText = "❌ Ошибка получения статуса: " + (err && err.message ? err.message : err);
      }
      var wrapper = document.querySelector('.container');
      if (wrapper) {
        wrapper.classList.add('done');
      }
    }).getProcessingStatus(); 
  }, 500); // Опрос каждые 500 мс (функция getProcessingStatus — в скрипте таблицы, мост к библиотеке)
</script>


 </body>
</html>
